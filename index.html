<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You Babyyy ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* 🌌 Stars */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/9Q9Z1Zm.png');
    animation: move 60s linear infinite;
}

@keyframes move {
    from {background-position: 0 0;}
    to {background-position: 10000px 5000px;}
}

/* Screens */
.screen {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

/* Name animation */
.name {
    font-size: 40px;
    color: #ff4b7d;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px #ff4b7d;}
    to {text-shadow: 0 0 25px #ff4b7d;}
}

/* Buttons */
button {
    padding: 12px 25px;
    margin: 10px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
}

.next {
    background: #ff4b7d;
    color: white;
}

.no {
    position: absolute;
}

/* Image */
img {
    width: 220px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
    <h1 class="name">Babyyy ❤️</h1>
    <p>I made something for you… please see 🥺</p>
    <button class="next" onclick="next(1)">Open</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
    <h1>I'm Sorry 😔</h1>
    <p>I know I hurt you again and again… and I hate it…</p>
    <button class="next" onclick="next(2)">Next</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
    <h1>Our Memories ❤️</h1>
    <img id="slide" src="photo1.jpg">
    <p>Every moment with you is special babyyy…</p>
    <button class="next" onclick="next(3)">Next</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
    <h1>Truth 💔</h1>
    <p>I don’t ignore you… I just fail sometimes… but I care the most…</p>
    <button class="next" onclick="next(4)">Next</button>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="s5">
    <h1>Babyyy… ❤️</h1>
    <p>You are my world… my everything 💕</p>

    <button class="next" onclick="finalMsg()">Forgive Me 💖</button>
    <button class="no" id="noBtn">No 😢</button>
</div>

<script>
// Screen change
function next(n){
    document.getElementById("s"+n).classList.remove("active");
    document.getElementById("s"+(n+1)).classList.add("active");
}

// Final message
function finalMsg(){
    alert("I LOVE YOU THE MOST BABYYY ❤️");
}

// No button run
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", ()=>{
    noBtn.style.top = Math.random()*window.innerHeight+"px";
    noBtn.style.left = Math.random()*window.innerWidth+"px";
});

// Slideshow
let images = ["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
let i = 0;
setInterval(()=>{
    document.getElementById("slide").src = images[i];
    i = (i+1) % images.length;
},2000);
</script>

</body>
</html>
